apply plugin: 'com.android.application'\n\nandroid {\n    compileSdk 33\n\n    defaultConfig {\n        applicationId "com.qernovra.spotifie"\n        minSdk 21\n        targetSdk 33\n        versionCode 1\n        versionName "1.0"\n    }\n\n    buildTypes {\n        release {\n            minifyEnabled false\n            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'\n        }\n    }\n}\n\ndependencies {\n    implementation 'com.squareup.retrofit2:retrofit:2.9.0'\n    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'\n    implementation 'com.google.code.gson:gson:2.8.6'\n    implementation 'com.google.android.material:material:1.8.0'\n    implementation 'androidx.recyclerview:recyclerview:1.2.1'\n    implementation 'androidx.media:media:1.5.0'\n    // Additional Spotify dependencies\n    implementation 'com.spotify.android:spotify-auth:1.2.3'  // Spotify Authentication SDK\n    implementation 'com.spotify.android:spotify-android-sdk:1.2.3'  // Spotify Android SDK\n}\n